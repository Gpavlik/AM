/* ===== Базові стилі ===== */
 @font-face {
      font-family: "Digital-7_Mono-";
      src: url("./digital-7__mono-.ttf")  format("truetype");
      font-weight: normal;
      font-style: normal;
    }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #01b401, #004d00);
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.container{
  width: 100%;
  max-width: 1200px;
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.dashboard {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  margin-top: 40px;
}

.block {
  background: #20d620;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  text-align: center;
}

#filters {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

label {
  display: flex;
  flex-direction: column;
  margin: 10px;
  font-weight: bold;
  text-align: left;
  max-width: 100%;
}

input, select {
  width: 100%;
  max-width: 500px;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  box-sizing: border-box;
}

/* ===== Адаптація для планшетів ===== */
@media (max-width: 1024px) {
  .dashboard {
    gap: 20px;
  }
  .block {
    width: 200px;
    padding: 15px;
  }
  input, select {
    max-width: 300px;
    font-size: 0.95rem;
  }
}

/* ===== Адаптація для мобільних ===== */
@media (max-width: 600px) {
  body {
    align-items: stretch;
  }
  .dashboard {
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
  }
  .block {
    width: 90%;
    max-width: 350px;
    padding: 15px;
  }
  #filters {
    flex-direction: column;
    align-items: stretch;
    gap: 15px;
  }
  input, select {
    width: 90%;
    max-width: 90%;
    font-size: 1rem;
  }
  label {
    margin: 5px 0;
    text-align: center;
  }
}

/* ===== Select2 кастомізація ===== */
.select2-container .select2-selection--multiple {

  border-radius: 8px;

}

.select2-container .select2-dropdown {

}

.select2-container .select2-search__field {
  background-color: #fff;
  color: #000;
  border: none;
  padding: 6px;
  font-size: 1rem;
}

.custom-select2.select2-container--default 
.select2-selection--multiple 
.select2-selection__choice {
  position: relative !important;
  background-color: #009400 !important;
  color: #fff !important;

  overflow-wrap: break-word !important;
  word-break: break-word !important;

  box-sizing: border-box !important;

}

.select2-selection__choice__display {

  border-radius: 50%;

}

    <script>
// ===== Користувачі =====
const userNames = {
  fedir: "Олександр Красніков",
  olena: "Тетяна Романовська",
  office: "Офіс",
  andriy: "Тетяна Кліменко",
  maria: "Тетяна Демус",
  serhiy: "Ілона Бабенко",
  admin: "admin"
};

const currentUser = localStorage.getItem("currentUser") || "admin";

// ===== План на день =====
const planDay = { gastro:1, oto:2, gyn:5, partner:1 };

// ===== Кешування =====
function saveCache(type, data, lastRow) {
  localStorage.setItem(type + "Cache", JSON.stringify(data));
  localStorage.setItem(type + "LastRow", lastRow);
}
function loadCache(type) {
  const raw = localStorage.getItem(type + "Cache");
  return raw ? JSON.parse(raw) : [];
}
function loadLastRow(type) {
  return Number(localStorage.getItem(type + "LastRow")) || 1;
}

async function fetchIncremental(type, userKey) {
  const lastRow = loadLastRow(type);
  const url = `https://script.google.com/macros/s/AKfycbz5nYRq0T3rdS3WuSDZM8yA2ROdwXiJIDM_y31e9Bisfqu5bzBsge6tqP-T6rYZni5Hjg/exec?type=${type}&userName=${userNames[userKey]}&lastRow=${lastRow}`;
  console.log(`🔗 Інкрементальний запит: ${url}`);

  try {
    const resp = await fetch(url);
    const data = await resp.json();

    let cache = loadCache(type);

    if (data.length > 0) {
      let seen;
      let fresh;

      if (type === "doctor") {
        seen = new Set(cache.map(v => v.date + "_" + v.doctor));
        fresh = data.filter(v => !seen.has(v.date + "_" + v.doctor));
      } else if (type === "partner") {
        seen = new Set(cache.map(v => v.date + "_" + v.partnerName));
        fresh = data.filter(v => !seen.has(v.date + "_" + v.partnerName));
      } else {
        // fallback: якщо інший тип
        seen = new Set(cache.map(v => v.visitId));
        fresh = data.filter(v => !seen.has(v.visitId));
      }

      if (fresh.length > 0) {
        cache = cache.concat(fresh);
        const newLastRow = lastRow + fresh.length;
        saveCache(type, cache, newLastRow);
      }
    } else {
      console.log(`ℹ️ Нових даних для [${type}] немає`);
    }

    return cache;
  } catch (err) {
    console.error(`❌ Помилка запиту [${type}]:`, err);
    return loadCache(type);
  }
}

// ===== Допоміжні функції =====
function countWorkingDays(startDate, endDate) {
  let count = 0, d = new Date(startDate);
  while (d <= endDate) {
    const day = d.getDay();
    if (day !== 0 && day !== 6) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function uniqueDoctorVisits(visits) {
  const set = new Set();
  visits.forEach(v => set.add(v.date + "_" + v.doctor));
  return set.size;
}
function uniquePartnerVisits(visits) {
  const set = new Set();
  visits.forEach(v => set.add(v.date + "_" + v.partnerName));
  return set.size;
}

// ===== Глобальні змінні для спідометрів =====
let gaugeDay, gaugeWeek, gaugeMonth, gaugeQuarter;

// ===== Ініціалізація спідометрів =====
function initGauges() {
  gaugeDay = new JustGage({ id:"gaugeDay", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
  gaugeWeek = new JustGage({ id:"gaugeWeek", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
  gaugeMonth = new JustGage({ id:"gaugeMonth", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
  gaugeQuarter = new JustGage({ id:"gaugeQuarter", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
}

// ===== Оновлення спідометра =====
function updateGauge(id, value) {
  if (id === "gaugeDay" && gaugeDay) gaugeDay.refresh(value);
  if (id === "gaugeWeek" && gaugeWeek) gaugeWeek.refresh(value);
  if (id === "gaugeMonth" && gaugeMonth) gaugeMonth.refresh(value);
  if (id === "gaugeQuarter" && gaugeQuarter) gaugeQuarter.refresh(value);
}

// ===== Основна логіка =====
function loadData(userKey) {
  const specialty = $("#specialtyFilter").val(); // лише спеціальність

  const today = new Date();

  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay() + 1);
  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate() + 6);

  const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);

  const quarter = Math.floor(today.getMonth() / 3);
  const startOfQuarter = new Date(today.getFullYear(), quarter * 3, 1);
  const endOfQuarter = new Date(today.getFullYear(), quarter * 3 + 3, 0);

  const periods = {
    day: { start: today, end: today },
    week: { start: startOfWeek, end: endOfWeek },
    month: { start: startOfMonth, end: endOfMonth },
    quarter: { start: startOfQuarter, end: endOfQuarter }
  };

  let doctorVisits = loadCache("doctor");

  for (const [key, period] of Object.entries(periods)) {
    redrawGauges(key, doctorVisits, specialty, period);
  }
}
function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}

function redrawGauges(key, doctorVisits, specialty, period) {
  doctorVisits = doctorVisits.filter(v => {
    const d = parseDate(v.date);
    if (!d) return false;

    if (key === "day") {
      return isSameDay(d, period.start); // тільки дата, без часу
    }
    return d >= period.start && d <= period.end;
  });

  if (specialty && specialty !== "Всі спеціальності") {
    doctorVisits = doctorVisits.filter(v => v.specialty === specialty);
  }

  const factTotal = uniqueDoctorVisits(doctorVisits);

  const days = countWorkingDays(period.start, period.end);
  let planTotal = 0;
  if (specialty === "Гастроентерологія") planTotal = planDay.gastro * days;
  else if (specialty === "Отоларингологія") planTotal = planDay.oto * days;
  else if (specialty === "Гінекологія") planTotal = planDay.gyn * days;
  else planTotal = (planDay.gastro + planDay.oto + planDay.gyn) * days;

  const percent = planTotal > 0 ? (factTotal / planTotal) * 100 : 0;
  const gaugeId = "gauge" + key.charAt(0).toUpperCase() + key.slice(1);

  updateGauge(gaugeId, percent);

  const infoId = gaugeId + "Info";
  document.getElementById(infoId).textContent =
    `Факт: ${factTotal} | План: ${planTotal} | ${percent.toFixed(1)}%`;

  console.log("🔎", key, "Факт:", factTotal, "План:", planTotal);
}


// ===== Оновлення кешу і перемальовування =====
async function refreshData(type, userKey) {
  // тягнемо нові дані
  await fetchIncremental(type, userKey);
  // завжди малюємо з кешу (навіть якщо нових даних немає)
  loadData(userKey);
}

// ===== Ініціалізація =====
$(document).ready(function() {
  // Select2
  $("#partnerSelect").select2({ placeholder:"Оберіть партнера", allowClear:true, width:'300px' });
  $("#productSelect").select2({ placeholder:"Оберіть продукт", allowClear:true, width:'300px' });

  // Створюємо спідометри один раз
  initGauges();

  // Поточна дата
  const today = new Date().toISOString().split("T")[0];
  $("#startDate").val(today);

  // Малюємо одразу з кешу
  loadData(currentUser);

  // Оновлюємо кеш і перемальовуємо
  refreshData("doctor", currentUser);
  refreshData("partner", currentUser);

  // При зміні фільтрів — перемальовуємо з кешу
  $("#userFilter, #specialtyFilter, #partnerSelect, #productSelect, #startDate").on("change", function() {
    const userKey = (currentUser === "admin") ? $("#userFilter").val() : currentUser;
    loadData(userKey);
  });
});

// ===== Парсинг дати =====
function parseDate(str) {
  if (!str) return null;
  if (str.includes(".")) {
    const [day, month, year] = str.split(".");
    return new Date(parseInt(year), parseInt(month)-1, parseInt(day));
  }
  return new Date(str); // ISO формат
}
document.addEventListener("DOMContentLoaded", () => {
  const today = new Date();
  const options = { year: 'numeric', month: 'long', day: 'numeric' };
  const formattedDate = today.toLocaleDateString('uk-UA', options);

  const userName = userNames[currentUser] || currentUser;

  document.getElementById("userInfoTop").textContent =
    `${formattedDate} | ${userName}`;
});
</script>
