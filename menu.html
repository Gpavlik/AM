
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpg" href="bol.jpg">
  <title>Вхід</title>
  <style>
body {
  font-family: Arial, sans-serif;
  margin: 0; padding: 0;
  background: linear-gradient(135deg, #009400, #004d00);
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
button {
  width: 200px; padding: 12px; margin-top: 10px;
  background-color: #004d00; color: #ffffff;
  border: solid 1px #c2ffc2; border-radius: 6px; font-size: 1rem;
  cursor: pointer; transition: background 0.3s ease;
}
.btn {
  background-color: #c20000; border: solid 1px #ffc2c2;
}
button:hover { background-color: #2aaf2a; }
.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 20px;
}
h1 { margin-top: 30px; text-align: center; font-size: 2rem; }
/* 📱 Телефони (до 480px) */
@media (max-width: 480px) {
  button {
    width: 100%; /* кнопки на всю ширину */
    font-size: 0.9rem;
  }
  .buttons {
    grid-template-columns: 1fr; /* одна колонка */
    gap: 8px;
  }
  h1 {
    font-size: 1.5rem; /* менший заголовок */
  }
}
/* 📲 Планшети (481px–768px) */
@media (min-width: 481px) and (max-width: 768px) {
  button {
    width: 90%; /* ширші кнопки */
    font-size: 1rem;
  }
  .buttons {
    grid-template-columns: repeat(2, 1fr); /* дві колонки */
    gap: 8px;
  }
  h1 {
    font-size: 1.8rem;
  }
}
/* 💻 Десктопи (769px і більше) */
@media (min-width: 769px) {
  button {
    width: 200px;
  }
  .buttons {
    grid-template-columns: repeat(2, 1fr);
  }
  h1 {
    font-size: 2rem;
  }
}
</style>
</head>
<body>
    <h1>Меню</h1>
<br>
  <img src="./logo.svg" alt="logo" width="260">
  <div id="menu">
  <div class="buttons">
  <button onclick="goTo('visits.html')">Візити в мережі</button>
  <button onclick="goTo('visitpharm.html')">Візити в аптеку</button>
  <button onclick="goTo('docvisit.html')">Візити до лікаря</button>
  <button onclick="goTo('calculator.html')">Калькулятори</button>
  <button onclick="goTo('reports.html')">Звіти</button>
  <button onclick="goTo('calendar.html')">Календар</button>
  <button class="btn" onclick="goTo('index.html')">Вийти</button>

  </div>
</div><br><br>
 <img src="./ph.png" alt="logo" width="260">
<script>
  function goTo(page) {
  window.location.href = page;
}
</script>
</body>
</html>
