<!DOCTYPE html>
<html>
<head>
  <title>Google Picker Test</title>
  <script type="text/javascript" src="https://apis.google.com/js/api.js"></script>
  <script type="text/javascript" src="https://apis.google.com/js/client.js"></script>
  <script type="text/javascript" src="https://apis.google.com/js/picker.js"></script>
</head>
<body>
  <button onclick="onApiLoad()">Вибрати фото</button>

  <script type="text/javascript" src="https://apis.google.com/js/api.js"></script>
<script type="text/javascript" src="https://apis.google.com/js/client.js"></script>
<script type="text/javascript" src="https://apis.google.com/js/picker.js"></script>


<script>
  const CLIENT_ID = "836855251066-j3e1evke6nddu2m7c9kvhlhl9ere4tvs.apps.googleusercontent.com";
  const API_KEY = "AIzaSyCqqiVAg1B3hAcxFzCz4rEv98vdTLag3Ck";
  const FOLDER_ID = "10yVaHb8BRUOynAAfSNiEhoa_aRHBBv8x";
  const SCOPES = ['https://www.googleapis.com/auth/drive.file'];

  function onApiLoad() {
    gapi.load('auth', {'callback': onAuthApiLoad});
    gapi.load('picker');
  }

  function onAuthApiLoad() {
    gapi.auth.authorize(
      {
        'client_id': CLIENT_ID,
        'scope': SCOPES,
        'immediate': false
      },
      handleAuthResult
    );
  }

  function handleAuthResult(authResult) {
    if (authResult && !authResult.error) {
      const oauthToken = authResult.access_token;
      createPicker(oauthToken);
    }
  }

  function createPicker(oauthToken) {
    const picker = new google.picker.PickerBuilder()
      .addView(google.picker.ViewId.PHOTOS)
      .setOAuthToken(oauthToken)
      .setDeveloperKey(API_KEY)
      .setCallback(data => pickerCallback(data, oauthToken))
      .build();
    picker.setVisible(true);
  }

  async function pickerCallback(data, oauthToken) {
    if (data.action === google.picker.Action.PICKED) {
      const fileId = data.docs[0].id;

      // Переміщаємо файл у потрібну папку
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?addParents=${FOLDER_ID}`, {
        method: "PATCH",
        headers: {
          "Authorization": "Bearer " + oauthToken,
          "Content-Type": "application/json"
        }
      });

      const updated = await res.json();
      const fileUrl = "https://drive.google.com/file/d/" + updated.id + "/view";
      console.log("Фото переміщено у папку:", fileUrl);
      alert("Фото доступне за адресою: " + fileUrl);
    }
  }
</script>
</body>
</html>
