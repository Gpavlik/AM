<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Звіти по промо та відрядженнях</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #009400, #004d00);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h2 { margin-bottom: 20px; }
    .filters {
      background: #008000;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 12px;
      background-color: #004d00;
      color: #fff;
      border: solid 1px #c2ffc2;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover { background-color: #003300; }
  </style>
</head>
<body>
  <h2>Звіти</h2>
  <img src="./logo.svg" alt="logo" width="260">
  <div class="filters">
    <label>Дата початку
      <input type="date" id="startDate">
    </label>
    <label>Дата завершення
      <input type="date" id="endDate">
    </label>

    <button onclick="loadReport('promo')">📊 Показати звіт по промо</button>
    <button onclick="loadReport('trip')">📊 Показати звіт по відрядженнях</button>
  </div>

  <div id="report"></div>
  <button id="downloadBtn" style="display:none;">⬇️ Скачати в Excel</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
<img src="./ph.png" alt="logo" width="260">
<script>
    let currentData = [];

    async function loadReport(type) {
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;

      if (!start || !end) {
        alert("Будь ласка, виберіть обидві дати!");
        return;
      }

      const url = `https://script.google.com/macros/s/AKfycbwgtdmK4cygaqutq2m3uvml9ZBJISOlrFmkojvZCJ4yJqtojquw-eUHGzq8gQF_EneAYA/exec?type=${type}&start=${start}&end=${end}`;
      const res = await fetch(url);
      currentData = await res.json();

      // Рендеримо таблицю на сторінці
      const container = document.getElementById("report");
      container.innerHTML = "";
      if (currentData.length === 0) {
        container.innerHTML = "<p>Немає даних за цей період</p>";
        document.getElementById("downloadBtn").style.display = "none";
        return;
      }

      const table = document.createElement("table");
      table.border = "1";
      const headers = Object.keys(currentData[0]);
      const thead = document.createElement("thead");
      thead.innerHTML = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      currentData.forEach(row => {
        tbody.innerHTML += "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join("") + "</tr>";
      });
      table.appendChild(tbody);

      container.appendChild(table);
      document.getElementById("downloadBtn").style.display = "inline-block";
    }

    document.getElementById("downloadBtn").addEventListener("click", () => {
      const ws = XLSX.utils.json_to_sheet(currentData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Report");
      XLSX.writeFile(wb, "report.xlsx");
    });
  </script>
</body>
</html>
