<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Маршрут співробітника</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpg" href="bol.jpg">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAA6Ca97lK_WjLvqmQsZuNyQWzf5S9qTmo&callback=initMap" async defer></script>
  <style>
    #map { 
      height: 800px; 
      width: 90%; 
      max-width: 1000px;
      margin: 20px auto;
      border: 1px solid #c2ffc2;
      border-radius: 20px;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #009400, #004d00);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    label {
      display: block; 
      margin: 10px auto 5px auto; 
      font-weight: bold;
      width: 500px; 
      text-align: left;
    }
    input, select {
      width: 500px; 
      padding: 10px; 
      margin: 5px auto 15px auto;
      border: none; 
      border-radius: 6px; 
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      width: 200px; 
      padding: 12px; 
      margin: 10px 15px;
      background-color: #004d00; 
      color: #ffffff;
      border: solid 1px #c2ffc2; 
      border-radius: 6px; 
      font-size: 1rem;
      cursor: pointer; 
      transition: background 0.3s ease;
    }
    button:hover { background-color: #003300; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }
    @media screen and (max-width: 480px) {
      label, input, select { width: 90%; font-size: 0.9rem; }
      button { width: 80%; font-size: 0.9rem; }
    }
    @media screen and (min-width: 481px) and (max-width: 768px) {
      label, input, select { width: 80%; font-size: 1rem; }
      button { width: 60%; font-size: 1rem; }
    }
    @media screen and (min-width: 769px) {
      label, input, select { width: 500px; }
      button { width: 200px; }
    }
  </style>
  </head>
<body>
  <label>Співробітник:</label>
  <select id="userSelect">
    <option value="Тетяна Романовська">Тетяна Романовська</option>
  </select>
  <label>Початок:</label>
  <input type="date" id="startDate" value="2026-04-01">
  <label>Кінець:</label>
  <input type="date" id="endDate" value="2026-04-30">
  <button onclick="showVisits()">Показати</button>

  <div id="map"></div>

<script>
let map;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 50.45, lng: 30.52 },
    zoom: 10
  });
  refreshAllData("admin");
}

function showLoading() {
  document.getElementById("loadingOverlay").style.visibility = "visible";
  document.getElementById("loadingMusic").play();
}
function hideLoading() {
  document.getElementById("loadingOverlay").style.visibility = "hidden";
  const music = document.getElementById("loadingMusic");
  music.pause(); music.currentTime = 0;
}

async function refreshAllData(userKey) {
  showLoading();
  try {
    await Promise.all([
      refreshData("doctor", userKey),
      refreshData("partner", userKey),
      refreshData("pharmacy", userKey)
    ]);
    showVisits(userKey);
  } finally {
    hideLoading();
  }
}

function showVisits(userKey) {
  const doctors = loadCache("doctor");
  const partners = loadCache("partner");
  const pharmacies = loadCache("pharmacy");

  const allVisits = [...doctors, ...partners, ...pharmacies];

  allVisits.forEach(v => {
    if (!v.lat || !v.lon) return;
    const pos = { lat: parseFloat(v.lat), lng: parseFloat(v.lon) };

    const color = v.source === "doctor" ? "blue" :
                  v.source === "partner" ? "green" :
                  v.source === "pharmacy" ? "yellow" : "gray";

    const div = document.createElement("div");
    div.style.backgroundColor = color;
    div.style.border = "1px solid black";
    div.style.borderRadius = "50%";
    div.style.width = "12px";
    div.style.height = "12px";

    new google.maps.marker.AdvancedMarkerElement({
      position: pos,
      map: map,
      title: `${v.userName} — ${v.date} ${v.time}`,
      content: div
    });
  });
}
</script>
</body>
</html>
