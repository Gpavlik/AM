<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Маршрут співробітника</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpg" href="bol.jpg">
  <style>
    #map { 
      height: 800px; 
      width: 90%; 
      max-width: 1000px;
      margin: 20px auto;
      border: 1px solid #c2ffc2;
      border-radius: 20px;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #009400, #004d00);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    label {
      display: block; 
      margin: 10px auto 5px auto; 
      font-weight: bold;
      width: 500px; 
      text-align: left;
    }
    input, select {
      width: 500px; 
      padding: 10px; 
      margin: 5px auto 15px auto;
      border: none; 
      border-radius: 6px; 
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      width: 200px; 
      padding: 12px; 
      margin: 10px 15px;
      background-color: #004d00; 
      color: #ffffff;
      border: solid 1px #c2ffc2; 
      border-radius: 6px; 
      font-size: 1rem;
      cursor: pointer; 
      transition: background 0.3s ease;
    }
    button:hover { background-color: #003300; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }
    @media screen and (max-width: 480px) {
      label, input, select { width: 90%; font-size: 0.9rem; }
      button { width: 80%; font-size: 0.9rem; }
    }
    @media screen and (min-width: 481px) and (max-width: 768px) {
      label, input, select { width: 80%; font-size: 1rem; }
      button { width: 60%; font-size: 1rem; }
    }
    @media screen and (min-width: 769px) {
      label, input, select { width: 500px; }
      button { width: 200px; }
    }
  </style>
</head>
<body>
  <h2>Маршрут співробітника</h2>
  <img src="./logo.svg" alt="logo" width="260">
  <div class="controls" id="controls">
    <label for="userSelect">Співробітник:
      <select id="userSelect">
        <option value="">Виберіть співробітника</option>
        <option value="fedir">Олександр Красніков</option>
        <option value="olena">Тетяна Романовська</option>
        <option value="office">Офіс</option>
        <option value="andriy">Тетяна Кліменко</option>
        <option value="maria">Тетяна Демус</option>
        <option value="serhiy">Ілона Бабенко</option>
      </select>
    </label>
    <label for="startDate">Початок:
      <input type="date" id="startDate">
    </label>
    <label for="endDate">Кінець:
      <input type="date" id="endDate">
    </label>
    <button onclick="showVisits()">Показати</button>
  </div>
  <div id="map"></div>
  <div id="report" style="margin-top:20px;"></div>
  <img src="./ph.png" alt="logo" width="260">

<script>
  let map;

  async function loadGPS(userName, startDate, endDate) {
    let url = `https://script.google.com/macros/s/AKfycbwe6U1COu-_Qb2gdfXtYj87v6iwRoPsxU9SkoAZOMZpaNVdKLs6USBHtkB3CnmFkMXxnw/exec?type=gps&userName=${encodeURIComponent(userName)}`;
    if (startDate) url += `&startDate=${startDate}`;
    if (endDate) url += `&endDate=${endDate}`;

    const response = await fetch(url);
    const visits = await response.json();
    return visits.filter(v => v.lat && v.lon);
  }

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 6,
      center: { lat: 50.45, lng: 30.52 } // Київ
    });
  }

  async function showVisits() {
    const userName = document.getElementById("userSelect").value;
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    const allVisits = await loadGPS(userName, startDate, endDate);

    if (allVisits.length === 0) {
      alert("Немає координат для цього користувача у вибраному періоді.");
      return;
    }

    allVisits.sort((a, b) => new Date(`${a.date} ${a.time}`) - new Date(`${b.date} ${b.time}`));

    const center = { lat: parseFloat(allVisits[0].lat), lng: parseFloat(allVisits[0].lon) };
    map.setCenter(center);
    map.setZoom(8);

    const reportDiv = document.getElementById("report");
    reportDiv.innerHTML = "";

    // створюємо таблицю
const table = document.createElement("table");
table.border = "1";
const header = table.insertRow();
["Користувач","Дата","Час","Заклад","Відстань (м)","Тип візиту"].forEach(h => {
  const cell = header.insertCell();
  cell.innerHTML = `<strong>${h}</strong>`;
});

allVisits.forEach((v, index) => {
  const visitPos = { lat: parseFloat(v.lat), lng: parseFloat(v.lon) };
  const placePos = (v.placeLat && v.placeLon) ? { lat: parseFloat(v.placeLat), lng: parseFloat(v.placeLon) } : null;

  let color = "gray";
  if (v.source === "doctor") color = "blue";
  else if (v.source === "pharmacy") color = "yellow";
  else if (v.source === "partner") color = "green";

  let label = "";
  if (index === 0) label = "Старт";
  else if (index === allVisits.length - 1) label = "Фініш";

  const visitMarker = new google.maps.marker.AdvancedMarkerElement({
    position: visitPos,
    map: map,
    title: `${v.date} ${v.time}`,
    content: (() => {
      const div = document.createElement("div");
      div.style.backgroundColor = color;
      div.style.border = "1px solid black";
      div.style.borderRadius = "50%";
      div.style.width = "12px";
      div.style.height = "12px";
      div.title = label ? `${label} (${v.date} ${v.time})` : `${v.date} ${v.time}`;
      return div;
    })()
  });

  if (v.distance) {
    const visitInfo = new google.maps.InfoWindow({
      content: `<div>Відстань: ${v.distance} м<br>Час: ${v.time}</div>`
    });
    visitMarker.addListener("click", () => {
      visitInfo.open(map, visitMarker);
    });
  }

  if (placePos) {
    const placeMarker = new google.maps.marker.AdvancedMarkerElement({
      position: placePos,
      map: map,
      title: v.partnerName || v.lpz || "Заклад"
    });

    const placeInfo = new google.maps.InfoWindow({
      content: `<div><strong>${v.partnerName || v.lpz || "Заклад"}</strong></div>`
    });
    placeMarker.addListener("click", () => {
      placeInfo.open(map, placeMarker);
    });

    new google.maps.Polyline({
      path: [visitPos, placePos],
      geodesic: true,
      strokeColor: "#FF0000",
      strokeOpacity: 1.0,
      strokeWeight: 2,
      map: map
    });
  }

// 🆕 перетворюємо source у українську назву
  let visitType = "";
  if (v.source === "doctor") visitType = "Лікар";
  else if (v.source === "pharmacy") visitType = "Аптека";
  else if (v.source === "partner") visitType = "Мережа";

  // додаємо рядок у таблицю
  const row = table.insertRow();
  row.insertCell().innerText = v.userName;
  row.insertCell().innerText = v.date;
  row.insertCell().innerText = v.time;
  row.insertCell().innerText = v.partnerName || v.lpz || v.address || "";
  row.insertCell().innerText = v.distance || "";
  row.insertCell().innerText = visitType; // 🆕 тип візиту
});

reportDiv.appendChild(table);
  }
</script>

<!-- правильне підключення API -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAA6Ca97lK_WjLvqmQsZuNyQWzf5S9qTmo&callback=initMap&libraries=marker">
</script>
</body>
</html>
