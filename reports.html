<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/jpg" href="bol.jpg">
  <title>Звіт</title>
  <style>
     body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #009400, #004d00);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #7a7a7a; padding: 6px; text-align: center; }
    th { background: #adadad; }
    td.name { text-align: left; }
    .vital { background-color: #26a12b; }
    .valuable { background-color: #286ca3; }
    .acceptable { background-color: #e0d037; }
    .interfering { background-color: #c78a90; }
    .filters {
      display: flex; gap: 10px; margin-top: 20px;
      flex-wrap: wrap; justify-content: center;
    }
    label {
      display: block; margin: 10px auto 5px auto; font-weight: bold;
      width: px; text-align: left;
    }
    input {
      width: 120px; padding: 10px; margin: 5px auto 15px auto;
      border: none; border-radius: 6px; font-size: 1rem;

    }
    select {
      width: 500px; padding: 10px; margin: 5px auto 15px auto;
      border: none; border-radius: 6px; font-size: 1rem;
    }
    button {
      width: 200px; padding: 12px; margin-top: 10px;
      background-color: #004d00; color: #ffffff;
      border: solid 1px #c2ffc2; border-radius: 6px; font-size: 1rem;
      cursor: pointer; transition: background 0.3s ease;
    }
     h3 { margin-top: 30px; text-align: center; }
    button:hover { background-color: #25a525; }
/* стилі для таблиці */
td.to-sell {
  text-align: center;
  font-weight: bold;
  color: white;
}
.buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;

    }
</style>
</head>
<body>
  <h1>Звіти</h1>
  <p id="userInfo"></p>
<img src="./logo.svg" alt="logo" width="360">
    <!-- Панель кнопок -->
<div class="filters">
  <label>Дата від: <input type="date" id="startDate"></label>
  <label>Дата до: <input type="date" id="endDate"></label>
</div>
  <!-- селект користувача показуємо лише адміну -->
<div id="userFilter" style="display:none;">
  <label>Користувач:
    <select id="userName">
      <option value="admin">admin</option>
      <option value="fedir">Олександр Красніков</option>
      <option value="olena">Тетяна Романовська</option>
      <option value="office">Офіс</option>
      <option value="andriy">Тетяна Кліменко</option>
      <option value="maria">Тетяна Демус</option>
      <option value="serhiy">Ілона Бабенко</option>
    </select>
  </label>
</div>
<div id="userFilter">
<!-- Фільтр по партнерах -->
<label for="partnerSelect">Партнер:
  <select id="partnerSelect">
  <option value="">Оберіть партнера</option>
  <!-- опції додаються динамічно у JS -->
  </select>
</label>
<!-- Фільтр по продуктах -->
<label for="productSelect">Продукт:
  <select id="productSelect">
  <option value="">Оберіть продукт</option>
  <!-- опції додаються динамічно у JS -->
  </select>
  </label>
</div>
<div class="buttons">
  <button onclick="loadReport('pharmacy')">Аптечні візити</button>
  <button onclick="loadReport('pharmacyPhoto')">Фото</button>
  <button onclick="loadReport('partner')">Візити до партнерів</button>
  <button onclick="loadContactsReport()">Контактні особи</button>
  <button onclick="loadReport('calendar')">Календар</button>
  <a href="menu.html"><button class="button">Перейти в меню</button></a>
</div>
  <div id="report"></div>
  <button onclick="exportToExcel()">Експортувати в Excel</button>
  <img src="./ph.png" alt="logo" width="360">

  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const userNames = {
  fedir: "Олександр Красніков",
  olena: "Тетяна Романовська",
  office: "Офіс",
  andriy: "Тетяна Кліменко",
  maria: "Тетяна Демус",
  serhiy: "Ілона Бабенко",
  admin: "admin"
};

const userMap = {
  fedir: [9,798,31,15,41,26,32,66,47,17,121,61,52,76,29,22,94,23,16,55],
  olena: [11,53,45,146,181,27,601,108,10],
  office: [1,2,3,4,5],
  andriy: [18,19],
  maria: [49,46,36,7,28,30,37,14,56,38,60],
  serhiy: [12,75,13,8,21,67,48]
};

const productNames = [
  "CLK№50","CLK№5","CLK№25","CL2GK№50","HPAg","Ultra","Solomini№5","Secret№2",
  "Secret","Duet","Syphilis","Rota","CLpH№25","CLpH№1","ActimPROM","HIV","HCV",
  "HBsAg","StrA","Influenza","CovidAg","CovidAg+Influenza","TnI","CardioCombo",
  "multy5","multy10"
];

const currentUser = localStorage.getItem("currentUser");
const info = document.getElementById("userInfo");

if (currentUser && userNames[currentUser]) {
  info.textContent = "Користувач: " + userNames[currentUser];
} else {
  info.textContent = "Користувач: невідомий";
}

if (currentUser === "admin") {
  document.getElementById("userFilter").style.display = "block";
}

let selectedPartnerName = "";
let selectedProductName = "";
let visits = [];        // глобально зберігаємо дані
let currentType = "";   // глобально зберігаємо тип звіту

// ініціалізація партнерів
function initPartners(userKey) {
  const partners = JSON.parse(localStorage.getItem("partners")) || [];
  const ids = userMap[userKey] || [];
  const filtered = (userKey === "admin") ? partners : partners.filter(p => ids.includes(Number(p.id)));

  const partnerSelect = document.getElementById("partnerSelect");
  partnerSelect.innerHTML = `<option value="">Оберіть партнера</option>`;
  filtered.forEach(p => {
    const option = document.createElement("option");
    option.value = p.name;
    option.textContent = p.name;
    partnerSelect.appendChild(option);
  });

  partnerSelect.addEventListener("change", e => {
    selectedPartnerName = e.target.value;
  });
}

// ініціалізація продуктів
function initProducts() {
  const productSelect = document.getElementById("productSelect");
  productSelect.innerHTML = `<option value="">Оберіть продукт</option>`;
  productNames.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    productSelect.appendChild(option);
  });

  productSelect.addEventListener("change", e => {
    selectedProductName = e.target.value;
  });
}

// завантаження звіту з урахуванням фільтрів
async function loadReport(type) {
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;

  let userName = currentUser;
  if (userName === "admin") {
    userName = document.getElementById("userName").value;
  }
  if (userNames[userName]) {
    userName = userNames[userName];
  }

  const url = `https://script.google.com/macros/s/AKfycbyRTIT1ty-pQnw8yPPxnjnXzc-NeZJ3wpigm9KwR7O0F2kePw74ha2TAUnzwxCNyDqUTQ/exec?type=${type}&startDate=${startDate}&endDate=${endDate}&userName=${encodeURIComponent(userName)}&partnerName=${encodeURIComponent(selectedPartnerName)}&productName=${encodeURIComponent(selectedProductName)}`;

  const res = await fetch(url);
  const raw = await res.text();

  let data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    document.getElementById("report").innerHTML = "<p>Помилка парсингу JSON</p>";
    return;
  }

  if (!data.length) {
    document.getElementById("report").innerHTML = "<p>Немає даних</p>";
    return;
  }

  if (type === "pharmacy") {
    renderPharmacyReport(data);
  } else if (type === "partner") {
    renderPartnerReport(data);
  } else {
    renderDefaultTable(data);
  }
}

// аптечні візити
function renderPharmacyReport(data) {
  const grouped = {};
  data.forEach(row => {
    const key = `${row.userName}_${row.date}_${row.time}_${row.partnerId}`;
    if (!grouped[key]) {
      grouped[key] = {
        userName: row.userName,
        date: row.date,
        time: row.time,
        partnerId: row.partnerId,
        partnerName: row.partnerName,
        city: row.city,
        address: row.address,
        contact: row.contactName,
        phone: row.contactPhone,
        display: row.display,
        awareness: row.awareness,
        comment: row.comment,
        products: []
      };
    }
    grouped[key].products.push({
      name: row.product,
      available: row.available,
      quantity: row.quantity,
      competitor: row.competitors
    });
  });

  let html = "";
  Object.values(grouped).forEach(v => {
    html += `
      <h3>${v.userName} — ${v.date} ${v.time}</h3>
      <p>${v.partnerName}, ${v.city}, ${v.address}</p>
      <p>Контакт: ${v.contact || "-"} (${v.phone || "-"})</p>
      <p>Викладка: ${v.display}, Обізнаність: ${v.awareness}</p>
      <p>Коментар: ${v.comment}</p>
      <table>
        <tr><th>Продукт</th><th>Наявність</th><th>Кількість</th><th>Конкурент</th></tr>
    `;
    v.products.forEach(p => {
      html += `<tr>
        <td>${p.name}</td>
        <td>${p.available}</td>
        <td>${p.quantity || "-"}</td>
        <td>${p.competitor || "-"}</td>
      </tr>`;
    });
    html += "</table><hr/>";
  });
  document.getElementById("report").innerHTML = html;
  window.lastReportData = data;
}

// візити до партнерів (беремо з аркуша "Візити")
function renderPartnerReport(data) {
  const grouped = {};
  data.forEach(row => {
    const key = `${row.userName}_${row.partnerName}_${row.date}_${row.status}`;
    if (!grouped[key]) {
      grouped[key] = {
        userName: row.userName,
        partner: row.partnerName,
        date: row.date,
        status: row.status,
        comment: row.comment,
        products: []
      };
    }
    grouped[key].products.push({
      name: row.product,
      percent: row.percent,
      quantity: row.quantity,
      penetration: row.penetration,
      stock: row.stock,
      expiry: row.expiry,
      competitor: row.competitor,
      vtm: row.vtm,
      exclusive: row.exclusive,
      conditions: row.conditions
    });
  });

  let html = "";
  Object.values(grouped).forEach(v => {
    html += `
      <h3>${v.userName} — ${v.partner} (${v.date})</h3>
      <p>Статус: ${v.status}</p>
      <p>Коментар: ${v.comment}</p>
      <table>
        <tr>
          <th>Назва</th><th>%</th><th>Кількість</th><th>Пенетрація</th>
          <th>Залишки</th><th>Термін придатності</th><th>Конкурент</th>
          <th>ВТМ</th><th>Ексклюзив</th><th>Умови %</th>
        </tr>
    `;
v.products.forEach(p => {
  // перевіряємо чи є хоча б одне заповнене поле окрім назви
  const hasData =
    (p.percent && p.percent !== "") ||
    (p.quantity && p.quantity !== "") ||
    (p.penetration && p.penetration !== "") ||
    (p.stock && p.stock !== "") ||
    (p.expiry && p.expiry !== "") ||
    (p.competitor && p.competitor !== "") ||
    (p.vtm && p.vtm !== "") ||
    (p.exclusive && p.exclusive !== "") ||
    (p.conditions && p.conditions !== "");

  if (hasData) {
    html += `<tr>
      <td>${p.name}</td>
      <td>${p.percent || "-"}</td>
      <td>${p.quantity || "-"}</td>
      <td>${p.penetration || "-"}</td>
      <td>${p.stock || "-"}</td>
      <td>${formatExpiry(p.expiry)}</td>
      <td>${p.competitor || "-"}</td>
      <td>${p.vtm || "-"}</td>
      <td>${p.exclusive || "-"}</td>
      <td>${p.conditions || "-"}</td>
    </tr>`;
  }
});

    html += "</table><hr/>";
  });
  document.getElementById("report").innerHTML = html;
  window.lastReportData = data;
}
function formatExpiry(expiry) {
  if (!expiry) return "-";
  try {
    const d = new Date(expiry);
    // повертаємо тільки місяць та рік
    const month = d.toLocaleString("uk-UA", { month: "long" });
    const year = d.getFullYear();
    return `${month} ${year}`;
  } catch {
    return expiry; // якщо не вдалося розпарсити, показуємо як є
  }
}

async function loadContactsReport() {
  const url = `https://script.google.com/macros/s/AKfycbyRTIT1ty-pQnw8yPPxnjnXzc-NeZJ3wpigm9KwR7O0F2kePw74ha2TAUnzwxCNyDqUTQ/exec?type=contacts`;
  
  try {
    const res = await fetch(url);
    const raw = await res.text();
    let data = JSON.parse(raw);

    if (!data.length) {
      document.getElementById("report").innerHTML = "<p>Немає даних</p>";
      return;
    }

    // будуємо таблицю
    let html = "<table>";
    html += "<tr><th>Користувач</th><th>Партнер</th><th>Контактна особа</th><th>Телефон</th></tr>";
    data.forEach(row => {
      html += `<tr>
        <td>${row.userName || "-"}</td>
        <td>${row.partnerName || "-"}</td>
        <td>${row.contactName || "-"}</td>
        <td>${row.contactPhone || "-"}</td>
      </tr>`;
    });
    html += "</table>";

    document.getElementById("report").innerHTML = html;
    window.lastReportData = data;
  } catch (err) {
    console.error(err);
    document.getElementById("report").innerHTML = "<p>Помилка завантаження даних</p>";
    
  }
}

// дефолтна таблиця
function renderDefaultTable(data) {
  let html = "<table><tr>";
  Object.keys(data[0]).forEach(key => html += "<th>" + key + "</th>");
  html += "</tr>";
  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(val => html += "<td>" + val + "</td>");
    html += "</tr>";
  });
  html += "</table>";
  document.getElementById("report").innerHTML = html;
}

// запуск ініціалізації після завантаження сторінки
document.addEventListener("DOMContentLoaded", () => {
  initPartners(currentUser);
  initProducts();
});

function exportToExcel() {
  const data = window.lastReportData || [];
  if (!data.length) {
    alert("Немає даних для експорту");
    return;
  }

  // створюємо нову книгу
  const wb = XLSX.utils.book_new();

  // перетворюємо масив об’єктів у аркуш
  const ws = XLSX.utils.json_to_sheet(data);

  // додаємо аркуш у книгу
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  // генеруємо файл .xlsx
  XLSX.writeFile(wb, "report.xlsx");
}


</script>
</body>
</html>
