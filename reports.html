body {

  align-items: center;
}

/* базові стилі таблиці */
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
  overflow-x: auto;
  display: block;
}

th, td {
  border: 1px solid #7a7a7a;
  padding: 6px;
  text-align: center;
  font-size: 0.95rem;
}

th {
  background: #adadad;
  color: #000;
}

td.name { text-align: left; font-weight: bold; }
td { background-color: rgba(255,255,255,0.05); }
td.to-sell { text-align: center; font-weight: bold; color: white; }

.filters {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

label {
  display: flex;
  flex-direction: column;
  margin: 10px;
  font-weight: bold;
  text-align: left;
  max-width: 100%;
}

input, select {
  width: 100%;
  max-width: 500px;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  box-sizing: border-box;
}
button {
  width: 200px;
  padding: 12px;
  margin-top: 10px;
  background-color: #004d00;
  color: #ffffff;
  border: solid 1px #c2ffc2;
  border-radius: 6px;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.3s ease;
}

button:hover { background-color: #25a525; }

.buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
}

/* 📱 Телефони (до 480px) */
@media (max-width: 480px) {
  h3 { font-size: 1.2rem; }
  p { font-size: 0.9rem; }
  table { font-size: 0.75rem; }
  th, td { padding: 4px; }
  input, select { max-width: 95%; }
  button {
    width: 100%;
    font-size: 0.9rem;
  }
  .buttons { grid-template-columns: 1fr; }
}

/* 📲 Планшети (481px–768px) */
@media (min-width: 481px) and (max-width: 768px) {
  h3 { font-size: 1.4rem; }
  p { font-size: 1rem; }
  table { font-size: 0.85rem; }
  th, td { padding: 5px; }
  input, select { max-width: 90%; }
  button { width: 70%; font-size: 1rem; }
  .buttons { grid-template-columns: repeat(2, 1fr); }
}

/* 💻 Десктопи (769px і більше) */
@media (min-width: 769px) {
  h3 { font-size: 1.6rem; }
  p { font-size: 1rem; }
  table { font-size: 0.95rem; }
  th, td { padding: 6px; }
  input { max-width: 120px; }
  select { max-width: 300px; }
  button { width: 200px; }
  .buttons { grid-template-columns: repeat(3, 1fr); }

// ініціалізація партнерів
function initPartners(userKey) {
  const partners = JSON.parse(localStorage.getItem("partners")) || [];
  const ids = userMap[userKey] || [];
  const filtered = (userKey === "admin") ? partners : partners.filter(p => ids.includes(Number(p.id)));

  const partnerSelect = $("#partnerSelect");
  partnerSelect.empty();
  filtered.forEach(p => {
    partnerSelect.append(new Option(p.name, p.name));
  });

  // ініціалізація Select2
  partnerSelect.select2({
    placeholder: "Оберіть партнера",
    allowClear: true
  });

  partnerSelect.on("change", function() {
    selectedPartnerName = $(this).val() || [];
  });
}
// ініціалізація продуктів
function initProducts() {
  const productSelect = $("#productSelect");
  productSelect.empty();
  productNames.forEach(name => {
    productSelect.append(new Option(name, name));
  });

  productSelect.select2({
    placeholder: "Оберіть продукт",
    allowClear: true
  });

  productSelect.on("change", function() {
    selectedProductName = $(this).val() || [];
  });
}


// завантаження звіту з урахуванням фільтрів
async function loadReport(type) {
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;

  let userKey = currentUser;
  let userName;

  if (userKey === "admin") {
    userName = document.getElementById("userName").value;
    if (userNames[userName]) {
      userName = userNames[userName];
    }
  } else {
    userName = userNames[userKey];
  }

  const url = `https://script.google.com/macros/s/AKfycbz5nYRq0T3rdS3WuSDZM8yA2ROdwXiJIDM_y31e9Bisfqu5bzBsge6tqP-T6rYZni5Hjg/exec?type=${type}`;

  const res = await fetch(url);
  const raw = await res.text();

  let data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    document.getElementById("report").innerHTML = "<p>Помилка парсингу JSON</p>";
    return;
  }

  // 🔎 Фільтрація на фронтенді
data = data.filter(row => {
  const matchUser = (currentUser === "admin") ? true : row.userName === userName;

  let matchDate = true;
  if (startDate) matchDate = matchDate && new Date(row.date) >= new Date(startDate);
  if (endDate) matchDate = matchDate && new Date(row.date) <= new Date(endDate);

  const matchPartner = selectedPartnerName.length
  ? selectedPartnerName.includes(row.partnerName)
  : true;

const matchProduct = selectedProductName.length
  ? selectedProductName.includes(row.product)
  : true;


  return matchUser && matchDate && matchPartner && matchProduct;
});


  if (!data.length) {
    document.getElementById("report").innerHTML = "<p>Немає даних</p>";
    return;
  }

  if (type === "pharmacy") {
    renderPharmacyReport(data);
  } else if (type === "partner") {
    renderPartnerReport(data);
  } else {
    renderDefaultTable(data);
  }
}

  document.getElementById("report").innerHTML = "<p>Фільтри скинуто. Оберіть нові параметри.</p>";
}

// аптечні візити
function renderPharmacyReport(data) {
  const grouped = {};
  data.forEach(row => {
    const key = `${row.userName}_${row.date}_${row.time}_${row.partnerId}`;
    if (!grouped[key]) {
      grouped[key] = {
        userName: row.userName,
        date: row.date,
        time: row.time,
        partnerId: row.partnerId,
        partnerName: row.partnerName,
        city: row.city,
        address: row.address,
        contact: row.contactName,
        phone: row.contactPhone,
        display: row.display,
        awareness: row.awareness,
        comment: row.comment,
        products: []
      };
    }
    grouped[key].products.push({
      name: row.product,
      available: row.available,
      quantity: row.quantity,
      competitor: row.competitors
    });
  });

  let html = "";
  Object.values(grouped).forEach(v => {
    html += `
      <h3>${v.userName} — ${v.date} ${v.time}</h3>
      <p>${v.partnerName}, ${v.city}, ${v.address}</p>
      <p>Контакт: ${v.contact || "-"} (${v.phone || "-"})</p>
      <p>Викладка: ${v.display}, Обізнаність: ${v.awareness}</p>
      <p>Коментар: ${v.comment}</p>
      <table>
        <tr><th>Продукт</th><th>Наявність</th><th>Кількість</th><th>Конкурент</th></tr>
    `;
    v.products.forEach(p => {
      html += `<tr>
        <td>${p.name}</td>
        <td>${p.available}</td>
        <td>${p.quantity || "-"}</td>
        <td>${p.competitor || "-"}</td>
      </tr>`;
    });
    html += "</table><hr/>";
  });
  document.getElementById("report").innerHTML = html;
  window.lastReportData = data;
}

});

function formatExpiry(expiry) {
  if (!expiry) return "-";
  try {
    const d = new Date(expiry);
    // повертаємо тільки місяць та рік
    const month = d.toLocaleString("uk-UA", { month: "long" });
    const year = d.getFullYear();
    return `${month} ${year}`;
  } catch {
    return expiry; // якщо не вдалося розпарсити, показуємо як є
  }
}

  } catch (err) {
    console.error(err);
    document.getElementById("report").innerHTML = "<p>Помилка завантаження даних</p>";
  }
}

function renderDoctorVisitsReport(data) {
  const grouped = {};
  data.forEach(row => {
    const key = `${row.userName}_${row.date}_${row.time}_${row.doctor}`;
    if (!grouped[key]) {
      grouped[key] = {
        userName: row.userName,
        date: row.date,
        time: row.time,
        region: row.region,
        city: row.city,
        lpz: row.lpz,
        specialty: row.specialty,
        doctor: row.doctor,
        products: []
      };
    }

    grouped[key].products.push({
      product: row.product,
      agreement: row.agreement,
      competitors: row.competitors,
      presentationShown: row.presentationShown,
      slides: row.slides
    });
  });

  let html = "";
  Object.values(grouped).forEach(v => {
    html += `
      <h3>${v.userName} — ${v.date} ${v.time}</h3>
      <p>Лікар: ${v.doctor} (${v.specialty})</p>
      <p>ЛПЗ: ${v.lpz}, ${v.city}, ${v.region}</p>
      <table>
        <tr>
          <th>Продукт</th>
          <th>Домовленість</th>
          <th>Конкуренти</th>
          <th>Презентація</th>
          <th>Слайди</th>
        </tr>
    `;
    v.products.forEach(p => {
      html += `<tr>
        <td>${p.product || "-"}</td>
        <td>${p.agreement || "-"}</td>
        <td>${p.competitors || "-"}</td>
        <td>${p.presentationShown || "-"}</td>
        <td>${p.slides || "-"}</td>
      </tr>`;
    });
    html += "</table><hr/>";
  });

  document.getElementById("report").innerHTML = html;
  window.lastReportData = data;
}
function populateFilters(data) {
  const cities = [...new Set(data.map(r => r.city).filter(Boolean))];
  const lpzs = [...new Set(data.map(r => r.lpz).filter(Boolean))];
  const specialties = [...new Set(data.map(r => r.specialty).filter(Boolean))];

  const citySelect = document.getElementById("cityFilter");
  const lpzSelect = document.getElementById("lpzFilter");
  const specialtySelect = document.getElementById("specialtyFilter");

  // очищаємо перед заповненням
  citySelect.innerHTML = "<option value=''>Всі</option>";
  lpzSelect.innerHTML = "<option value=''>Всі</option>";
  specialtySelect.innerHTML = "<option value=''>Всі</option>";

  cities.forEach(c => citySelect.innerHTML += `<option value="${c}">${c}</option>`);
  lpzs.forEach(l => lpzSelect.innerHTML += `<option value="${l}">${l}</option>`);
  specialties.forEach(s => specialtySelect.innerHTML += `<option value="${s}">${s}</option>`);
}

function applyFilters(data) {
  const city = document.getElementById("cityFilter").value;
  const lpz = document.getElementById("lpzFilter").value;
  const specialty = document.getElementById("specialtyFilter").value;

  return data.filter(r =>
    (!city || r.city === city) &&
    (!lpz || r.lpz === lpz) &&
    (!specialty || r.specialty === specialty)
  );
}

// дефолтна таблиця
function renderDefaultTable(data) {
  let html = "<table><tr>";
  Object.keys(data[0]).forEach(key => html += "<th>" + key + "</th>");
  html += "</tr>";
  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(val => html += "<td>" + val + "</td>");
    html += "</tr>";
  });
  html += "</table>";
  document.getElementById("report").innerHTML = html;
}

// запуск ініціалізації після завантаження сторінки
document.addEventListener("DOMContentLoaded", () => {
  initPartners(currentUser);
  initProducts();
});

function exportToExcel() {
  const data = window.lastReportData || [];
  if (!data.length) {
    alert("Немає даних для експорту");
    return;
  }

  // створюємо нову книгу
  const wb = XLSX.utils.book_new();

  // перетворюємо масив об’єктів у аркуш
  const ws = XLSX.utils.json_to_sheet(data);

  // додаємо аркуш у книгу
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  // генеруємо файл .xlsx
  XLSX.writeFile(wb, "report.xlsx");
}
