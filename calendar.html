<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Календар планувальник</title>
  <link rel="icon" type="image/jpg" href="bol.jpg">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #009400, #004d00);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #calendar {
      max-width: 900px;
      margin: 0 auto;
      padding: 15px;
    }
    #addVisitForm {
      margin: 20px auto;
      max-width: 600px;
      padding: 15px;
      border: 1px solid #ffffff;
      border-radius: 8px;
      background: #2bac1f;
    }
    #addVisitForm input, #addVisitForm select, #addVisitForm button {
      margin: 5px 0;
      padding: 8px;
      width: 100%;
      border-radius: 4px;
      border: 1px solid #ffffff;
    }
    #addVisitForm button {
      background: #4CAF50;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    #addVisitForm button:hover {
      background: #388E3C;
    }
    input, select {
      border: 1px solid #ffffff;
      padding: 4px;
      border-radius: 4px;
      font-size: 13px;
      width: 100%; 
      margin: 0px;
      box-sizing: border-box;
      background-color: #26a12b;
      color: #fff;
    }
    :placeholder-shown {
      background-color: #f5fdf6;
      color: #fff;
    }
    /* фон модалки */
.modal {
  display: none; /* приховано за замовчуванням */
  position: fixed; /* поверх усіх елементів */
  z-index: 1000; /* високий пріоритет */
  left: 0;
  top: 0;
  width: 100%; /* на всю ширину */
  height: 100%; /* на всю висоту */
  overflow: auto; /* прокрутка якщо контент великий */
  background-color: rgba(0,0,0,0.5); /* напівпрозорий чорний фон */
}

/* контейнер контенту */
.modal-content {
  background-color: #fff;
  margin: 10% auto; /* відступ зверху і по центру */
  padding: 20px;
  border-radius: 8px;
  width: 400px; /* ширина модалки */
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  text-align: center;
}

/* кнопки */
.modal-content button {
  margin: 8px;
  padding: 10px 16px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

#startBtn { background-color: #32CD32; color: #fff; }
#rescheduleBtn { background-color: #1E90FF; color: #fff; }
#confirmReschedule { background-color: #FFD700; color: #000; }
#cancelBtn { background-color: #DC143C; color: #fff; }

  </style>
</head>
<body>
  <h2>Календар планувальник</h2>
  <img src="./logo.svg" alt="logo" width="360">

  <!-- Форма додавання візиту -->
  <div id="addVisitForm">
    <h3>Додати запланований візит</h3>
    <label>Партнер:</label>
    <select id="partnerSelect"></select>

    <label>Дата:</label>
    <input type="date" id="visitDate">

    <label>Час:</label>
    <input type="time" id="visitTime">

    <label>Коментар:</label>
    <input type="text" id="visitComment" placeholder="Наприклад: перемовини, підпис документів">

    <button onclick="addVisit()">Додати візит</button>
  </div>

  <!-- Календар -->
  <div id="calendar"></div>
  <img src="./ph.png" alt="logo" width="360">
<!-- Модальне вікно -->
<div id="visitModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <button id="startBtn">Почати</button>
    <button id="rescheduleBtn">Перенести</button>
    <input type="date" id="newDate" style="display:none;">
    <input type="time" id="newTime" style="display:none;">
    <button id="confirmReschedule">Підтвердити перенесення</button>
    <button id="cancelBtn">Відмінити</button>
  </div>
</div>


  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script>
  const userNames = {
    fedir: "Олександр Красніков",
    olena: "Тетяна Романовська",
    office: "Офіс",
    andriy: "Тетяна Кліменко",
    maria: "Тетяна Демус",
    serhiy: "Ілона Бабенко"
  };

  const userMap = {
  fedir: [9,798,31,15,41,26,32,66,47,17,121,61,52,76,29,22,94,23,16,55],
  olena: [11,53,45,146,181,27,601,108,10],
  office: [1,2,3,4,5],
  andriy: [18,19],
  maria: [49,46,36,7,28,30,37,14,56,38,60],
  serhiy: [12,75,13,8,21,67,48]
  };

  const currentUserKey = localStorage.getItem("currentUser");
  if (!currentUserKey) {
    alert("Будь ласка, увійдіть спочатку!");
    window.location.href = "index.html";
  } else {
    const displayName = userNames[currentUserKey] || currentUserKey;
    document.body.insertAdjacentHTML("afterbegin", "<p>Ви увійшли як: " + displayName + "</p>");
  }

  function initPartners(userKey) {
    const partners = JSON.parse(localStorage.getItem("partners")) || [];
    const ids = userMap[userKey] || [];
    const filtered = partners.filter(p => ids.includes(Number(p.id)));

    const partnerSelect = document.getElementById("partnerSelect");
    partnerSelect.innerHTML = "";
    filtered.forEach(p => {
      partnerSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
    partnerSelect.innerHTML += `<option value="pharmacy">Аптека</option>`;
  }

  let calendar;

  document.addEventListener("DOMContentLoaded", () => {
    initPartners(currentUserKey);

    const calendarEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'uk',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      events: [],
      eventClick: handleEventClick,
      eventDidMount: styleEvent
    });
    calendar.render();

    loadVisits();
  });

  // стилізація подій за статусом
  function styleEvent(info) {
    const status = info.event.extendedProps.status || info.event.title.split(":")[0];
    if (status.includes("Заплановано")) info.el.style.backgroundColor = "#FFD700";
    else if (status.includes("Перенесено")) info.el.style.backgroundColor = "#1E90FF";
    else if (status.includes("Відмінений")) info.el.style.backgroundColor = "#DC143C";
    else if (status.includes("Проведений")) info.el.style.backgroundColor = "#32CD32";
  }

  // обробка кліку на подію
function handleEventClick(info) {
  const event = info.event;
  document.getElementById('modalTitle').innerText = event.title;
  document.getElementById('visitModal').style.display = 'block';

  // "Почати"
  document.getElementById('startBtn').onclick = () => {
  const event = info.event;

  if (event.extendedProps.partnerId === "pharmacy" || event.extendedProps.partnerName === "Аптека") {
    const userName = event.extendedProps.userName; // беремо з події
    window.location.href = `visitpharm.html?userName=${encodeURIComponent(userName)}`;
    return;
  }

  // стандартна логіка для інших партнерів
  event.setProp('title', 'Проведений: ' + event.extendedProps.partnerName);
  event.setExtendedProp('status', 'Проведений');
  updateStatusInBackend(event, 'Проведений');
  window.location.href = `visits.html?partnerId=${event.extendedProps.partnerId}`;
};

  // "Перенести"
  document.getElementById('rescheduleBtn').onclick = () => {
    document.getElementById('newDate').style.display = 'inline';
    document.getElementById('newTime').style.display = 'inline';
  };

  document.getElementById('confirmReschedule').onclick = () => {
    const newDate = document.getElementById('newDate').value;
    const newTime = document.getElementById('newTime').value;
    if (!newDate || !newTime) return;
    const newStart = `${newDate}T${newTime}`;
    event.setStart(newStart);
    updateDateInBackend(event, newDate, newTime);
    document.getElementById('visitModal').style.display = 'none';
  };

  // "Відмінити"
  document.getElementById('cancelBtn').onclick = () => {
    event.setProp('title', 'Відмінений: ' + event.extendedProps.partnerName);
    event.setExtendedProp('status', 'Відмінений');
    updateStatusInBackend(event, 'Відмінений');
    document.getElementById('visitModal').style.display = 'none';
  };
}

  // оновлення статусу у бекенді
  async function updateStatusInBackend(event, newStatus) {
    await fetch("https://script.google.com/macros/s/AKfycbx-jWYompo6mKJxRwVRyNcWpBFv-JuodX2K0yQaNsMgKqoc1lYgSt9y5c1m3xgwZn4b/exec", {
      method: "POST",
       mode: "no-cors", // обхід CORS
      body: JSON.stringify({
        action: "updateStatus",
        partnerId: event.extendedProps.partnerId,
        date: event.startStr,
        status: newStatus
      })
    });
  }

  // оновлення дати у бекенді
  async function updateDateInBackend(event, newDate, newTime) {
    await fetch("https://script.google.com/macros/s/AKfycbx-jWYompo6mKJxRwVRyNcWpBFv-JuodX2K0yQaNsMgKqoc1lYgSt9y5c1m3xgwZn4b/exec", {
      method: "POST",
      mode: "no-cors", // обхід CORS
      body: JSON.stringify({
        action: "reschedule",
        partnerId: event.extendedProps.partnerId,
        oldDate: event.extendedProps.date,
        newDate: newDate,
        newTime: newTime,
        status: event.extendedProps.status
      })
    });
  }

  // додавання нового візиту
  async function addVisit() {
    const partnerId = document.getElementById("partnerSelect").value;
    const partnerName = document.getElementById("partnerSelect").options[document.getElementById("partnerSelect").selectedIndex].text;
    const date = document.getElementById("visitDate").value;
    const time = document.getElementById("visitTime").value;
    const comment = document.getElementById("visitComment").value;

    if (!date || !time) {
      alert("Будь ласка, виберіть дату і час");
      return;
    }

    const startDateTime = date + "T" + time;

    calendar.addEvent({
      title: "Заплановано: " + partnerName,
      start: startDateTime,
      extendedProps: { 
        partnerId: partnerId, 
        partnerName: partnerName, 
        comment: comment,
        status: "Заплановано",
        date: date
      }
    });

    try {
      await fetch("https://script.google.com/macros/s/AKfycbx-jWYompo6mKJxRwVRyNcWpBFv-JuodX2K0yQaNsMgKqoc1lYgSt9y5c1m3xgwZn4b/exec", {
        method: "POST",
         mode: "no-cors", // обхід CORS
        body: JSON.stringify({
          userName: userNames[currentUserKey],
          partnerId: partnerId,
          partnerName: partnerName,
          date: date,
          time: time,
          status: "Заплановано",
          comment: comment,
          data: []
        }),
        headers: { "Content-Type": "application/json" }
      });
      alert("Візит додано і збережено у Google Sheet!");
    } catch (err) {
      console.error("Помилка відправки:", err);
      alert("Не вдалося зберегти у Google Sheet");
    }
  }
function getPartnerIdByName(partnerName) {
  const partners = JSON.parse(localStorage.getItem("partners")) || [];
  const found = partners.find(p => p.name === partnerName);
  return found ? found.id : null;
}

  // завантаження подій
 async function loadVisits() {
  try {
    const currentUserKey = localStorage.getItem("currentUser");
    const currentUserName = userNames[currentUserKey]; // повне ім’я

    const res = await fetch("https://script.google.com/macros/s/AKfycbx-jWYompo6mKJxRwVRyNcWpBFv-JuodX2K0yQaNsMgKqoc1lYgSt9y5c1m3xgwZn4b/exec");
    const text = await res.text();
    console.log("▶ Сирий текст від бекенду:", text);

    const visits = JSON.parse(text);
    console.log("▶ Масив visits після JSON.parse:", visits);

    // фільтруємо тільки свої
    const myVisits = visits.filter(v => v.userName === currentUserName);
    console.log("▶ Мої візити:", myVisits);

    myVisits.forEach(v => {
      const startDateTime = normalizeDate(v.date, v.time);
      console.log("▶ Додаю подію:", startDateTime, v.partnerName);

      const pid = getPartnerIdByName(v.partnerName);

      calendar.addEvent({
        title: `${v.status}: ${v.partnerName}`,
        start: startDateTime,
        extendedProps: {
          partnerId: pid,
          partnerName: v.partnerName,
          comment: v.comment,
          status: v.status,
          date: v.date,
          userName: v.userName
        }
      });
    });

  } catch (err) {
    console.error("Помилка завантаження:", err);
  }
}



    // конвертація дат у ISO формат
  function normalizeDate(dateStr, timeStr) {
    dateStr = String(dateStr).trim();
    timeStr = String(timeStr || "").trim();

    // Якщо дата вже у форматі YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
      return timeStr ? `${dateStr}T${timeStr}` : `${dateStr}T00:00`;
    }

    // Якщо дата у форматі DD.MM.YYYY
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)) {
      const [day, month, year] = dateStr.split(".");
      return timeStr ? `${year}-${month}-${day}T${timeStr}` : `${year}-${month}-${day}T00:00`;
    }

    // fallback — якщо формат невідомий
    return timeStr ? `${dateStr}T${timeStr}` : `${dateStr}T00:00`;
  }


  
function startVisit() {
  const partnerSelect = document.getElementById("partnerSelect");
  const partnerId = partnerSelect.value;
  const partnerName = partnerSelect.options[partnerSelect.selectedIndex].text;

  if (partnerId === "pharmacy") {
    // якщо вибрано "Аптека" → редирект на visitpharm.html
    window.location.href = "visitpharm.html";
  } else {
    // стандартна логіка для інших партнерів
    openVisitModal(partnerId, partnerName);
  }
}


</script>
</body>
</html>
